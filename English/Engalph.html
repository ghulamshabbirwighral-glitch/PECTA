<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>الفابیٹ کارڈز لرننگ</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f9f9f9; padding: 10px; margin: 0; }
        
        .page { width: 95%; max-width: 1200px; margin: 0 auto; background-color: white; border: 1px solid #ccc; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* ٹاپ انسٹرکشن ٹیکسٹ کی اسٹائلنگ */
        .game-instruction {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            margin: 5px auto 15px auto;
            max-width: 600px;
            line-height: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .line-set { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .letter-box { border: 2px solid #ddd; padding: 10px; border-radius: 10px; text-align: center; width: 120px; margin: 10px; background: white; transition: transform 0.2s; }
        .capital { font-size: 40px; font-weight: bold; display: block; color: #000; }
        .small { font-size: 25px; color: #555; display: block; }
        .img-box { width: 80px; height: 80px; margin-top: 5px; object-fit: contain; }
        
        /* وائس بٹن کی اسٹائلنگ اور اینیمیشن */
        .voice-btn { cursor: pointer; background: none; border: none; font-size: 24px; margin-top: 5px; transition: transform 0.1s; display: inline-block; }
        .voice-btn:active { transform: scale(0.8); }

        @media (min-height: 600px) {
            .game-instruction { font-size: 22px; margin-bottom: 25px; }
        }
    </style>
</head>
<body>

<div class="page">
    <p class="game-instruction">Press 🔊 to Learn</p>
    
    <div id="mainPage"></div>
</div>

<script>
    const container = document.getElementById('mainPage');
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    
    const images = {
        A: "apple.png", B: "ball.png", C: "cat.png", D: "dog.png", E: "egg.png",
        F: "fish.png", G: "goat.png", H: "hat.png", I: "ice.png", J: "jug.png",
        K: "kite.png", L: "lion.png", M: "mango.png", N: "nest.png", O: "owl.png",
        P: "pen.png", Q: "queen.png", R: "rat.png", S: "sun.png", T: "tap.png",
        U: "umbrella.png", V: "van.png", W: "watch.png", X: "xray.png", Y: "yalk.png", Z: "zebra.png"
    };

    const words = {
        A: "Apple", B: "Ball", C: "Cat", D: "Dog", E: "Egg",
        F: "Fish", G: "Goat", H: "Hat", I: "Ice", J: "Jug",
        K: "Kite", L: "Lion", M: "Mango", N: "Nest", O: "Owl",
        P: "Pen", Q: "Queen", R: "Rat", S: "Sun", T: "Tap",
        U: "Umbrella", V: "Van", W: "Watch", X: "Xray", Y: "Yoyo", Z: "Zebra"
    };

    function speakLetter(char) {
        window.speechSynthesis.cancel();
        const textToSpeak = char + " for " + words[char];
        const msg = new SpeechSynthesisUtterance(textToSpeak);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    let currentLine = document.createElement('div');
    currentLine.className = 'line-set';
    container.appendChild(currentLine);

    alphabet.forEach((char, index) => {
        const div = document.createElement('div');
        div.className = 'letter-box';
        div.innerHTML = `
            <span class="capital">${char}</span>
            <span class="small">${char.toLowerCase()}</span>
            <img src="images/${images[char]}" class="img-box" onerror="this.src='https://via.placeholder.com/80?text=No+Img'">
            <br><button class="voice-btn" onclick="speakLetter('${char}')">🔊</button>
        `;
        currentLine.appendChild(div);

        if ((index + 1) % 6 === 0) {
            currentLine = document.createElement('div');
            currentLine.className = 'line-set';
            container.appendChild(currentLine);
        }
    });
</script>
</body>
</html>
