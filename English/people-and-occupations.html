<!DOCTYPE html>
<html lang="ur">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4NHR43XLF6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4NHR43XLF6');
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4161884478253651" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>رشتہ دار اور پیشے - People and Occupations</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f4f8; padding: 10px; margin: 0; }
        .page { width: 95%; max-width: 1200px; margin: 0 auto; background-color: white; border: 1px solid #ccc; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #google_translate_element { text-align: center; margin-bottom: 15px; }
        .game-instruction { font-size: 18px; font-weight: bold; color: #2c3e50; text-align: center; margin: 5px auto 15px auto; max-width: 600px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .line-set { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        .letter-box { border: 2px solid #28a745; padding: 10px; border-radius: 12px; text-align: center; width: 175px; margin: 8px; background: white; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; position: relative; }
        .card-number { position: absolute; top: 5px; left: 5px; background-color: #e74c3c; color: white; font-size: 11px; font-weight: bold; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
        .img-box { width: 90px; height: 90px; object-fit: contain; margin: 6px 0; border-radius: 8px; background-color: #f9f9f9; }
        .word-text { font-size: 15px; font-weight: bold; color: #007bff; display: block; margin: 2px 0; }
        .urdu-meaning { font-size: 18px; font-weight: bold; color: #dc3545; display: inline-block; min-height: 24px; }
        .voice-btn-container { display: flex; justify-content: space-around; margin-top: 8px; border-top: 1px dashed #ddd; padding-top: 8px; }
        .voice-btn { cursor: pointer; background: #28a745; border: none; font-size: 14px; color: white; padding: 4px 10px; border-radius: 20px; transition: 0.2s; }
        .voice-btn.ur-btn { background: #dc3545; }
        .voice-btn:active { transform: scale(0.95); }
        @media (min-height: 600px) { .game-instruction { font-size: 22px; margin-bottom: 25px; } }
    </style>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ur', 
                includedLanguages: 'en,zh-CN,ru,fa,bn,ur,hi,ar,es,fr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>

<div class="page">
    <div id="google_translate_element"></div>
    <p class="game-instruction">Press 🔊 to Learn People and Occupations (رشتہ دار اور پیشے)</p>
    <div id="mainPage" class="line-set"></div>
</div>

<script>
    const container = document.getElementById('mainPage');
    
    const peopleData = [
        { num: 1, eng: "Dad / Father", urdu: "والد / ابو", img: "images/people_dad.jpg" },
        { num: 2, eng: "Mom / Mother", urdu: "والدہ / امی", img: "images/people_mom.jpg" },
        { num: 3, eng: "Son", urdu: "بیٹا", img: "images/people_son.jpg" },
        { num: 4, eng: "Daughter", urdu: "بیٹی", img: "images/people_daughter.jpg" },
        { num: 5, eng: "Older brother", urdu: "بڑا بھائی", img: "images/people_older_brother.jpg" },
        { num: 6, eng: "Older sister", urdu: "بڑی بہن", img: "images/people_older_sister.jpg" },
        { num: 7, eng: "Younger brother", urdu: "چھوٹا بھائی", img: "images/people_younger_brother.jpg" },
        { num: 8, eng: "Younger sister", urdu: "چھوٹی بہن", img: "images/people_younger_sister.jpg" },
        { num: 9, eng: "Friend", urdu: "دوست", img: "images/people_friend.jpg" },
        { num: 10, eng: "Teacher", urdu: "استاد / ٹیچر", img: "images/people_teacher.jpg" },
        { num: 11, eng: "Student", urdu: "طالب علم", img: "images/people_student.jpg" },
        { num: 12, eng: "Doctor", urdu: "ڈاکٹر", img: "images/people_doctor.jpg" },
        { num: 13, eng: "Mr.", urdu: "جناب / مسٹر", img: "images/people_mr.jpg" },
        { num: 14, eng: "Miss", urdu: "محترمہ / مس", img: "images/people_miss.jpg" },
        { num: 15, eng: "Classmate", urdu: "ہم جماعت", img: "images/people_classmate.jpg" },
        { num: 16, eng: "Husband", urdu: "شوہر", img: "images/people_husband.jpg" },
        { num: 17, eng: "Wife", urdu: "بیوی", img: "images/people_wife.jpg" },
        { num: 18, eng: "Child", urdu: "بچہ", img: "images/people_child.jpg" },
        { num: 19, eng: "Grandfather", urdu: "دادا / نانا", img: "images/people_grandfather.jpg" },
        { num: 20, eng: "Grandmother", urdu: "دادی / نانی", img: "images/people_grandmother.jpg" },
        { num: 21, eng: "Uncle", urdu: "چچا / ماموں", img: "images/people_uncle.jpg" },
        { num: 22, eng: "Aunt", urdu: "چچی / ممانی / خالہ", img: "images/people_aunt.jpg" },
        { num: 23, eng: "Manager", urdu: "مینیجر", img: "images/people_manager.jpg" },
        { num: 24, eng: "Colleague", urdu: "ساتھ کام کرنے والا", img: "images/people_colleague.jpg" },
        { num: 25, eng: "Neighbor", urdu: "پڑوسی", img: "images/people_neighbor.jpg" }
    ];

    peopleData.forEach((item, index) => {
        const box = document.createElement('div');
        box.className = 'letter-box';
        box.innerHTML = `
            <div class="card-number notranslate">${item.num}</div>
            <span class="word-text notranslate">${item.eng}</span>
            <img class="img-box" src="${item.img}" alt="${item.eng}" onerror="this.onerror=null; this.src='https://placehold.co/90x90?text=No+Image'">
            <span class="urdu-meaning" id="text-meaning-${index}">${item.urdu}</span>
            <div class="voice-btn-container">
                <button class="voice-btn" onclick="speak('${item.eng}', 'en-US')">🔊 En</button>
                <button class="voice-btn ur-btn" onclick="speakDynamic(${index})">🔊 Voice</button>
            </div>
        `;
        container.appendChild(box);
    });

    function speakDynamic(index) {
        const textElement = document.getElementById(`text-meaning-${index}`);
        const currentText = textElement.innerText || textElement.textContent;
        let detectedLang = 'ur-PK'; 
        let googleTranslateFrame = document.querySelector('.goog-te-menu-value');

        if (googleTranslateFrame) {
            const translatedLangText = googleTranslateFrame.textContent || '';
            if (translatedLangText.includes('Arabic') || translatedLangText.includes('عربية')) detectedLang = 'ar-SA';
            else if (translatedLangText.includes('Hindi') || translatedLangText.includes('हिन्दी')) detectedLang = 'hi-IN';
            else if (translatedLangText.includes('Persian') || translatedLangText.includes('فارسی')) detectedLang = 'fa-IR';
            else if (translatedLangText.includes('Russian') || translatedLangText.includes('русский')) detectedLang = 'ru-RU';
            else if (translatedLangText.includes('Bengali') || translatedLangText.includes('بنگالی')) detectedLang = 'bn-IN';
            else if (translatedLangText.includes('Chinese') || translatedLangText.includes('中文')) detectedLang = 'zh-CN';
            else if (translatedLangText.includes('Spanish') || translatedLangText.includes('Español')) detectedLang = 'es-ES';
            else if (translatedLangText.includes('French') || translatedLangText.includes('Français')) detectedLang = 'fr-FR';
            else if (translatedLangText.includes('English')) detectedLang = 'en-US';
        } else {
            const htmlLang = document.documentElement.lang;
            if (htmlLang.startsWith('ar')) detectedLang = 'ar-SA';
            else if (htmlLang.startsWith('zh')) detectedLang = 'zh-CN';
            else if (htmlLang.startsWith('ru')) detectedLang = 'ru-RU';
            else if (htmlLang.startsWith('fa')) detectedLang = 'fa-IR';
            else if (htmlLang.startsWith('bn')) detectedLang = 'bn-IN';
            else if (htmlLang.startsWith('hi')) detectedLang = 'hi-IN';
            else if (htmlLang.startsWith('es')) detectedLang = 'es-ES';
            else if (htmlLang.startsWith('fr')) detectedLang = 'fr-FR';
            else if (htmlLang.startsWith('en')) detectedLang = 'en-US';
        }
        speak(currentText, detectedLang);
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        window.speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
