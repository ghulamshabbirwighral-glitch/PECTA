<!DOCTYPE html>
<html lang="ur">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4NHR43XLF6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4NHR43XLF6');
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4161884478253651" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>جیسچرز لرننگ گیم - Gestures Learning Game</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f4f8; padding: 10px; margin: 0; }
        
        .page { 
            width: 95%; 
            max-width: 1200px; 
            margin: 0 auto; 
            background-color: white; 
            border: 1px solid #ccc; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }

        #google_translate_element {
            text-align: center;
            margin-bottom: 15px;
        }

        .game-instruction {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            margin: 5px auto 15px auto;
            max-width: 600px;
            line-height: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .line-set { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        .letter-box { border: 2px solid #28a745; padding: 10px; border-radius: 12px; text-align: center; width: 165px; margin: 8px; background: white; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        /* فکسڈ سائز کینوس برائے اشارات */
        .gesture-canvas { width: 90px; height: 90px; background: #fdfefe; border-radius: 8px; margin: 6px 0; border: 1px solid #eee; }
        
        /* نوٹ: .word-text پر class="notranslate" کا استعمال کیا گیا ہے تا کہ انگلش تبدیل نہ ہو */
        .word-text { font-size: 15px; font-weight: bold; color: #007bff; display: block; margin: 2px 0; letter-spacing: 0.5px; }
        
        .urdu-meaning { font-size: 18px; font-weight: bold; color: #dc3545; display: inline-block; vertical-align: middle; }
        
        .voice-btn-container { display: flex; justify-content: space-around; margin-top: 8px; border-top: 1px dashed #ddd; padding-top: 8px; }
        .voice-btn { cursor: pointer; background: #28a745; border: none; font-size: 16px; color: white; padding: 4px 10px; border-radius: 20px; transition: 0.2s; }
        .voice-btn.ur-btn { background: #dc3545; }
        .voice-btn:active { transform: scale(0.95); opacity: 0.9; }

        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }

        @media (min-height: 600px) {
            .game-instruction { font-size: 22px; margin-bottom: 25px; }
        }
    </style>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ur', 
                includedLanguages: 'en,zh-CN,ru,fa,bn,ur,hi,ar,es,fr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>

<div class="page">
    <div id="google_translate_element"></div>

    <p class="game-instruction">Press 🔊 to Learn Gestures (اشارے اور جذبات)</p>
    
    <div id="mainPage" class="line-set"></div>
</div>

<script>
    const container = document.getElementById('mainPage');
    
    // ڈیٹا لسٹ (انگریزی الفاظ پر class="notranslate" لاگو ہو گی)
    const actionWordsData = [
        { eng: "Fight", urdu: "لڑائی", type: "fight" },
        { eng: "Heated argument", urdu: "تکرار کرنا", type: "argument" },
        { eng: "Altercation", urdu: "جھگڑا", type: "altercation" },
        { eng: "Tension", urdu: "دباؤ یا پریشانی", type: "tension" },
        { eng: "Enmity", urdu: "دشمنی", type: "enmity" },
        { eng: "Provocation", urdu: "اشتعال دلانا", type: "provocation" },
        { eng: "Accusation", urdu: "الزام لگانا", type: "accusation" },
        { eng: "Denial", urdu: "انکار کرنا", type: "denial" },
        { eng: "Defense", urdu: "دفاع کرنا", type: "defense" },
        { eng: "Objection", urdu: "اعتراض کرنا", type: "objection" },
        { eng: "Threat", urdu: "دھمکی دینا", type: "threat" },
        { eng: "Reconciliation", urdu: "صلح کرنا", type: "reconciliation" },
        { eng: "Harmony", urdu: "اتفاق و اتحاد", type: "harmony" },
        { eng: "Negotiation", urdu: "مذاکرات", type: "negotiation" },
        { eng: "Concord", urdu: "باہمی رضامندی", type: "concord" },
        { eng: "Cooperation", urdu: "تعاون کرنا", type: "cooperation" }
    ];

    // ڈائنامک کارڈز بنانے کا عمل
    actionWordsData.forEach((item, index) => {
        const box = document.createElement('div');
        box.className = 'letter-box';
        
        // کینوس آئی ڈی جنریٹ کرنا
        const canvasId = `gestureCanvas_${index}`;
        
        // نوٹس کریں: یہاں 'word-text' اسپین میں کلاس 'notranslate' کا اضافہ کیا گیا ہے
        box.innerHTML = `
            <canvas id="${canvasId}" class="gesture-canvas" width="100" height="100"></canvas>
            <span class="word-text notranslate">${item.eng}</span>
            <span class="urdu-meaning">${item.urdu}</span>
            <div class="voice-btn-container">
                <button class="voice-btn notranslate" onclick="speakText('${item.eng}', 'en-US')">🔊</button>
                <button class="voice-btn ur-btn" onclick="speakText('${item.urdu}', 'ur-PK')">🔊</button>
            </div>
        `;
        
        container.appendChild(box);
        
        // کارڈ بننے کے بعد اسکرین شاٹ کے مطابق کینوس پر خاکہ بنانا
        setTimeout(() => drawGesture(canvasId, item.type), 50);
    });

    // کینوس پر اشاروں کے خاکے (Vector Drawings) بنانے کا فنکشن
    function drawGesture(canvasId, type) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        
        // چہروں یا ہاتھوں کے بنیادی رنگ
        const skinColor = '#ffdbac';
        const shirtColor1 = '#3498db';
        const shirtColor2 = '#e74c3c';

        if (type === "fight" || type === "argument" || type === "altercation") {
            // دو چہرے آمنے سامنے غصے میں
            ctx.fillStyle = skinColor;
            ctx.beginPath(); ctx.arc(30, 45, 15, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(70, 45, 15, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            // غصے کی لکیریں
            ctx.strokeStyle = 'red';
            ctx.beginPath(); ctx.moveTo(48, 30); ctx.lineTo(52, 35); ctx.moveTo(52, 30); ctx.lineTo(48, 35); ctx.stroke();
        } else if (type === "tension") {
            // سر پر ہاتھ رکھے پریشان شخص
            ctx.fillStyle = skinColor;
            ctx.beginPath(); ctx.arc(50, 45, 18, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.strokeStyle = '#2c3e50';
            // پریشانی کے بادل (سر کے اوپر)
            ctx.beginPath(); ctx.arc(50, 20, 8, 0, Math.PI*2); ctx.stroke();
        } else if (type === "enmity") {
            // ایک دوسرے کی طرف پیٹھ کیے ہوئے چہرے
            ctx.fillStyle = skinColor;
            ctx.beginPath(); ctx.arc(32, 50, 14, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(68, 50, 14, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.strokeStyle = 'black';
            ctx.beginPath(); ctx.moveTo(50, 35); ctx.lineTo(50, 65); ctx.stroke(); // درمیان میں لکیر
        } else if (type === "provocation" || type === "accusation" || type === "threat") {
            // انگلی سے اشارہ کرتا ہوا ہاتھ/شخص
            ctx.fillStyle = skinColor;
            ctx.beginPath(); ctx.arc(35, 45, 15, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.strokeStyle = 'black';
            ctx.beginPath(); ctx.moveTo(50, 50); ctx.lineTo(75, 50); ctx.stroke(); // اشارہ کرتی انگلی
        } else if (type === "denial") {
            // روکنے کا اشارہ کرتا ہوا ہاتھ (Cross یا Stop)
            ctx.fillStyle = skinColor;
            ctx.beginPath(); ctx.arc(50, 40, 16, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.strokeStyle = 'red'; // کراس مارک
            ctx.beginPath(); ctx.moveTo(70, 25); ctx.lineTo(82, 37); ctx.moveTo(82, 25); ctx.lineTo(70, 37); ctx.stroke();
        } else if (type === "defense") {
            // دفاعی ڈھال یا بچاؤ کا پوز
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath(); ctx.arc(50, 50, 18, 0, Math.PI, true); ctx.closePath(); ctx.fill(); ctx.stroke();
        } else if (type === "objection") {
            // انگلی اٹھا کر اعتراض کرنا
            ctx.fillStyle = skinColor;
            ctx.beginPath(); ctx.arc(50, 55, 15, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.strokeStyle = 'orange'; // الرٹ کا نشان
            ctx.beginPath(); ctx.moveTo(50, 20); ctx.lineTo(50, 32); ctx.moveTo(50, 38); ctx.arc(50, 38, 2, 0, Math.PI*2); ctx.stroke();
        } else if (type === "reconciliation" || type === "harmony" || type === "negotiation" || type === "concord" || type === "cooperation") {
            // ہاتھ ملانے یا تعاون کا نشان (Handshake)
            ctx.strokeStyle = '#27ae60';
            ctx.beginPath(); ctx.moveTo(25, 50); ctx.lineTo(45, 50); ctx.moveTo(75, 50); ctx.lineTo(55, 50); ctx.stroke();
            ctx.fillStyle = skinColor;
            ctx.beginPath(); ctx.arc(50, 50, 10, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        }
    }

    // وائس اوور فنکشن
    function speakText(text, lang) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // پہلے سے چلتی ہوئی آواز کو روکنے کے لیے
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            window.speechSynthesis.speak(utterance);
        } else {
            alert("آپ کا براؤزر آواز کو سپورٹ نہیں کرتا۔");
        }
    }
</script>

</body>
</html>
