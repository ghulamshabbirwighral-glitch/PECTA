<!DOCTYPE html>
<html lang="ur">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4NHR43XLF6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4NHR43XLF6');
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4161884478253651" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>جیسچرز لرننگ گیم - Gestures Learning Game</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f4f8; padding: 10px; margin: 0; }
        
        .page { 
            width: 95%; 
            max-width: 1200px; 
            margin: 0 auto; 
            background-color: white; 
            border: 1px solid #ccc; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }

        #google_translate_element {
            text-align: center;
            margin-bottom: 15px;
        }

        .game-instruction {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            margin: 5px auto 15px auto;
            max-width: 600px;
            line-height: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .line-set { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        .letter-box { border: 2px solid #28a745; padding: 10px; border-radius: 12px; text-align: center; width: 165px; margin: 8px; background: white; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        /* خوبصورت کلپ آرٹ امیجز کے لیے اسٹائل */
        .img-box { width: 90px; height: 90px; object-fit: contain; margin: 6px 0; border-radius: 8px; }
        
        /* class="notranslate" سے انگلش تبدیل نہیں ہوگی */
        .word-text { font-size: 15px; font-weight: bold; color: #007bff; display: block; margin: 2px 0; letter-spacing: 0.5px; }
        
        .urdu-meaning { font-size: 18px; font-weight: bold; color: #dc3545; display: inline-block; vertical-align: middle; }
        
        .voice-btn-container { display: flex; justify-content: space-around; margin-top: 8px; border-top: 1px dashed #ddd; padding-top: 8px; }
        .voice-btn { cursor: pointer; background: #28a745; border: none; font-size: 16px; color: white; padding: 4px 10px; border-radius: 20px; transition: 0.2s; }
        .voice-btn.ur-btn { background: #dc3545; }
        .voice-btn:active { transform: scale(0.95); opacity: 0.9; }

        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }

        @media (min-height: 600px) {
            .game-instruction { font-size: 22px; margin-bottom: 25px; }
        }
    </style>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ur', 
                includedLanguages: 'en,zh-CN,ru,fa,bn,ur,hi,ar,es,fr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>

<div class="page">
    <div id="google_translate_element"></div>

    <p class="game-instruction">Press 🔊 to Learn Gestures (اشارے اور جذبات)</p>
    
    <div id="mainPage" class="line-set"></div>
</div>

<script>
    const container = document.getElementById('mainPage');
    
    // مفت ہائی کوالٹی اوپن سورس کلپ آرٹ لنکس کے ساتھ ڈیٹا لسٹ
    const actionWordsData = [
        { eng: "Fight", urdu: "لڑائی", img: "https://openclipart.org/image/2400px/svg_to_png/190772/angry-face.png" },
        { eng: "Heated argument", urdu: "تکرار کرنا", img: "https://openclipart.org/image/2400px/svg_to_png/221524/Shouting-Man-Silhouette.png" },
        { eng: "Altercation", urdu: "جھگڑا", img: "https://openclipart.org/image/2400px/svg_to_png/183188/spat.png" },
        { eng: "Tension", urdu: "دباؤ یا پریشانی", img: "https://openclipart.org/image/2400px/svg_to_png/275681/Stressed-Out-Man.png" },
        { eng: "Enmity", urdu: "دشمنی", img: "https://openclipart.org/image/2400px/svg_to_png/216503/crossed-swords.png" },
        { eng: "Provocation", urdu: "اشتعال دلانا", img: "https://openclipart.org/image/2400px/svg_to_png/282216/Pointing-Finger.png" },
        { eng: "Accusation", urdu: "الزام لگانا", img: "https://openclipart.org/image/2400px/svg_to_png/294279/J'accuse.png" },
        { eng: "Denial", urdu: "انکار کرنا", img: "https://openclipart.org/image/2400px/svg_to_png/212232/Stop-Sign.png" },
        { eng: "Defense", urdu: "دفاع کرنا", img: "https://openclipart.org/image/2400px/svg_to_png/171261/shield-green.png" },
        { eng: "Objection", urdu: "اعتراض کرنا", img: "https://openclipart.org/image/2400px/svg_to_png/261947/Warning-Sign.png" },
        { eng: "Threat", urdu: "دھمکی دینا", img: "https://openclipart.org/image/2400px/svg_to_png/168532/1330368149.png" },
        { eng: "Reconciliation", urdu: "صلح کرنا", img: "https://openclipart.org/image/2400px/svg_to_png/21359/jarno-handshake.png" },
        { eng: "Harmony", urdu: "اتفاق و اتحاد", img: "https://openclipart.org/image/2400px/svg_to_png/191632/Peace-Sign-Doodle.png" },
        { eng: "Negotiation", urdu: "مذاکرات", img: "https://openclipart.org/image/2400px/svg_to_png/255018/1468603613.png" },
        { eng: "Concord", urdu: "باہمی رضامندی", img: "https://openclipart.org/image/2400px/svg_to_png/121857/perfect-match.png" },
        { eng: "Cooperation", urdu: "تعاون کرنا", img: "https://openclipart.org/image/2400px/svg_to_png/248386/People-Holding-Hands-Silhouettes.png" }
    ];

    // کارڈز بنانے کا عمل
    actionWordsData.forEach(item => {
        const box = document.createElement('div');
        box.className = 'letter-box';
        
        box.innerHTML = `
            <img src="${item.img}" alt="${item.eng}" class="img-box">
            <span class="word-text notranslate">${item.eng}</span>
            <span class="urdu-meaning">${item.urdu}</span>
            <div class="voice-btn-container">
                <button class="voice-btn notranslate" onclick="speakText('${item.eng}', 'en-US')">🔊</button>
                <button class="voice-btn ur-btn" onclick="speakText('${item.urdu}', 'ur-PK')">🔊</button>
            </div>
        `;
        
        container.appendChild(box);
    });

    // ٹو اسپیچ فنکشن
    function speakText(text, lang) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            window.speechSynthesis.speak(utterance);
        } else {
            alert("آپ کا براؤزر آواز کو سپورٹ نہیں کرتا۔");
        }
    }
</script>

</body>
</html>
