<!DOCTYPE html>
<html lang="ur">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4NHR43XLF6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4NHR43XLF6');
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4161884478253651" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>جیسچرز لرننگ گیم - Gestures Learning Game</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f4f8; padding: 10px; margin: 0; }
        
        .page { 
            width: 95%; 
            max-width: 1200px; 
            margin: 0 auto; 
            background-color: white; 
            border: 1px solid #ccc; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }

        #google_translate_element {
            text-align: center;
            margin-bottom: 15px;
        }

        .game-instruction {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            margin: 5px auto 15px auto;
            max-width: 600px;
            line-height: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .line-set { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        .letter-box { border: 2px solid #28a745; padding: 10px; border-radius: 12px; text-align: center; width: 165px; margin: 8px; background: white; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        /* امیجز کے لیے خوبصورت اسٹائل اور ہلکا گرے بیک گراؤنڈ */
        .img-box { width: 90px; height: 90px; object-fit: contain; margin: 6px 0; border-radius: 8px; background-color: #f9f9f9; }
        
        /* کلاس notranslate کا استعمال تاکہ انگریزی نام تبدیل نہ ہوں */
        .word-text { font-size: 15px; font-weight: bold; color: #007bff; display: block; margin: 2px 0; letter-spacing: 0.5px; }
        
        .urdu-meaning { font-size: 18px; font-weight: bold; color: #dc3545; display: inline-block; vertical-align: middle; }
        
        .voice-btn-container { display: flex; justify-content: space-around; margin-top: 8px; border-top: 1px dashed #ddd; padding-top: 8px; }
        .voice-btn { cursor: pointer; background: #28a745; border: none; font-size: 16px; color: white; padding: 4px 10px; border-radius: 20px; transition: 0.2s; }
        .voice-btn.ur-btn { background: #dc3545; }
        .voice-btn:active { transform: scale(0.95); opacity: 0.9; }

        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }

        @media (min-height: 600px) {
            .game-instruction { font-size: 22px; margin-bottom: 25px; }
        }
    </style>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ur', 
                includedLanguages: 'en,zh-CN,ru,fa,bn,ur,hi,ar,es,fr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>

<div class="page">
    <div id="google_translate_element"></div>

    <p class="game-instruction">Press 🔊 to Learn Gestures (اشارے اور جذبات)</p>
    
    <div id="mainPage" class="line-set"></div>
</div>

<script>
    const container = document.getElementById('mainPage');
    
    // تصویر میں موجود تمام 16 الفاظ کی فہرست ان کے اردو ترجمے اور .jpg فائل نیمز کے ساتھ
    const actionWordsData = [
        { eng: "Fight", urdu: "لڑائی", img: "images/01_fight.jpg" },
        { eng: "Heated argument", urdu: "تکرار کرنا", img: "images/02_heated_argument.jpg" },
        { eng: "Altercation", urdu: "جھگڑا", img: "images/03_altercation.jpg" },
        { eng: "Tension", urdu: "دباؤ یا پریشانی", img: "images/04_tension.jpg" },
        { eng: "Enmity", urdu: "دشمنی", img: "images/05_enmity.jpg" },
        { eng: "Provocation", urdu: "اشتعال دلانا", img: "images/06_provocation.jpg" },
        { eng: "Accusation", urdu: "الزام لگانا", img: "images/07_accusation.jpg" },
        { eng: "Denial", urdu: "انکار کرنا", img: "images/08_denial.jpg" },
        { eng: "Defense", urdu: "دفاع کرنا", img: "images/09_defense.jpg" },
        { eng: "Objection", urdu: "اعتراض کرنا", img: "images/10_objection.jpg" },
        { eng: "Threat", urdu: "دھمکی دینا", img: "images/11_threat.jpg" },
        { eng: "Reconciliation", urdu: "صلح کرنا", img: "images/12_reconciliation.jpg" },
        { eng: "Harmony", urdu: "ہم آہنگی", img: "images/13_harmony.jpg" },
        { eng: "Negotiation", urdu: "مذاکرات کرنا", img: "images/14_negotiation.jpg" },
        { eng: "Concord", urdu: "باہمی رضامندی", img: "images/15_concord.jpg" },
        { eng: "Cooperation", urdu: "تعاون کرنا", img: "images/16_cooperation.jpg" }
    ];

    // کارڈز کو اسکرین پر لوڈ کرنے کا جاوا اسکرپٹ لوپ
    actionWordsData.forEach(item => {
        const box = document.createElement('div');
        box.className = 'letter-box';

        box.innerHTML = `
            <span class="word-text notranslate">${item.eng}</span>
            <img class="img-box" src="${item.img}" alt="${item.eng}" onerror="this.onerror=null; this.src='https://placehold.co/90x90?text=No+Image'">
            <span class="urdu-meaning">${item.urdu}</span>
            <div class="voice-btn-container">
                <button class="voice-btn" onclick="speak('${item.eng}', 'en-US')">🔊 En</button>
                <button class="voice-btn ur-btn" onclick="speak('${item.urdu}', 'ur-PK')">🔊 Ur</button>
            </div>
        `;
        container.appendChild(box);
    });

    // آواز نکالنے کا فنکشن (Text to Speech)
    function speak(text, lang) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
