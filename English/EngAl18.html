<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f9f9f9; padding: 20px; }
        .page { 
    width: 95%; 
    max-width: 1200px; 
    margin: 0 auto; 
    background-color: white; 
    border: 1px solid #ccc; 
    padding: 20px; 
        }
        
        
        .line-set {
            height: 64px;
            background-image: repeating-linear-gradient(to bottom, red 0px, red 1px, transparent 1px, transparent 16px);
            background-size: 100% 16px; 
            display: flex; align-items: flex-end; margin-bottom: 50px;
        }
        
        .letter-pair { display: flex; align-items: baseline; margin-right: 40px; height: 64px; align-items: center; }
        
        .capital { 
            font-size: 50px; font-weight: bold; color: black; margin-right: 5px;
        }
        
        .small { 
            font-size: 30px; color: #333; margin-right: 10px;
        }
        
        /* وائس بٹن کی اسٹائلنگ */
        .voice-btn {
            cursor: pointer;
            background: none;
            border: none;
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="page" id="mainPage"></div>

<script>
    const container = document.getElementById('mainPage');
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    
    // ساؤنڈ چلانے کا فنکشن
    function speakLetter(char) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(char);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }
    
    for (let i = 0; i < alphabet.length; i += 3) {
        const lineSet = document.createElement('div');
        lineSet.className = 'line-set';
        
        for (let j = i; j < i + 3 && j < alphabet.length; j++) {
            const char = alphabet[j];
            const div = document.createElement('div');
            div.className = 'letter-pair';
            
            // یہاں بٹن کا کوڈ شامل کیا گیا ہے
            div.innerHTML = `
                <span class="capital">${char}</span>
                <span class="small">${char.toLowerCase()}</span>
                <button class="voice-btn" onclick="speakLetter('${char}')">🔊</button>
            `;
            lineSet.appendChild(div);
        }
        container.appendChild(lineSet);
    }
</script>
</body>
</html>
