<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4161884478253651" crossorigin="anonymous"></script>

<!-- Mobile Viewport -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>انگلش الفابیٹ لرننگ</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f9f9f9; padding: 10px; margin: 0; }
        
        .page { 
            width: 95%; 
            max-width: 1200px; 
            margin: 0 auto; 
            background-color: white; 
            border: 1px solid #ccc; 
            padding: 15px; 
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* ٹاپ انسٹرکشن ٹیکسٹ کی اسٹائلنگ */
        .game-instruction {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            margin: 5px auto 15px auto;
            max-width: 600px;
            line-height: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .line-set {
            height: 64px;
            background-image: repeating-linear-gradient(to bottom, red 0px, red 1px, transparent 1px, transparent 16px);
            background-size: 100% 16px; 
            display: flex; align-items: flex-end; margin-bottom: 50px;
        }
        
        .letter-pair { display: flex; align-items: baseline; margin-right: 40px; height: 64px; align-items: center; }
        
        .capital { 
            font-size: 50px; font-weight: bold; color: black; margin-right: 5px;
        }
        
        .small { 
            font-size: 30px; color: #333; margin-right: 10px;
        }
        
        /* وائس بٹن کی اسٹائلنگ */
        .voice-btn {
            cursor: pointer;
            background: none;
            border: none;
            font-size: 24px;
            transition: transform 0.1s;
        }
        .voice-btn:active {
            transform: scale(0.85);
        }

        /* موبائل اسکرینز کے لیے انسٹرکشن کا سائز */
        @media (min-height: 600px) {
            .game-instruction { font-size: 22px; margin-bottom: 25px; }
        }
    </style>
</head>
<body>

<div class="page">
    <!-- آپ کی ہدایت کے مطابق اب عبارت میں ڈائریکٹ اسپیکر کا نشان ہے -->
    <p class="game-instruction">Press 🔊 to Learn</p>
    
    <div id="mainPage"></div>
</div>

<script>
    const container = document.getElementById('mainPage');
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    
    // ساؤنڈ چلانے کا فنکشن
    function speakLetter(char) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(char);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }
    
    for (let i = 0; i < alphabet.length; i += 3) {
        const lineSet = document.createElement('div');
        lineSet.className = 'line-set';
        
        for (let j = i; j < i + 3 && j < alphabet.length; j++) {
            const char = alphabet[j];
            const div = document.createElement('div');
            div.className = 'letter-pair';
            
            div.innerHTML = `
                <span class="capital">${char}</span>
                <span class="small">${char.toLowerCase()}</span>
                <button class="voice-btn" onclick="speakLetter('${char}')">🔊</button>
            `;
            lineSet.appendChild(div);
        }
        container.appendChild(lineSet);
    }
</script>
</body>
</html>
