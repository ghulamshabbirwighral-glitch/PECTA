<!DOCTYPE html>
<html lang="ur">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4NHR43XLF6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4NHR43XLF6');
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4161884478253651" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>صفائی کے سامان کے نام - Cleaning Supplies Learning Game</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f4f8; padding: 10px; margin: 0; }
        
        .page { 
            width: 95%; 
            max-width: 1200px; 
            margin: 0 auto; 
            background-color: white; 
            border: 1px solid #ccc; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }

        #google_translate_element {
            text-align: center;
            margin-bottom: 15px;
        }

        .game-instruction {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            margin: 5px auto 15px auto;
            max-width: 600px;
            line-height: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .line-set { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        .letter-box { border: 2px solid #28a745; padding: 10px; border-radius: 12px; text-align: center; width: 175px; margin: 8px; background: white; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; position: relative; }
        
        .card-number {
            position: absolute;
            top: 5px;
            left: 5px;
            background-color: #e74c3c;
            color: white;
            font-size: 11px;
            font-weight: bold;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-box { width: 90px; height: 90px; object-fit: contain; margin: 6px 0; border-radius: 8px; background-color: #f9f9f9; }
        
        .word-text { font-size: 15px; font-weight: bold; color: #007bff; display: block; margin: 2px 0; letter-spacing: 0.5px; }
        .urdu-meaning { font-size: 18px; font-weight: bold; color: #dc3545; display: inline-block; vertical-align: middle; min-height: 24px; }
        
        .voice-btn-container { display: flex; justify-content: space-around; margin-top: 8px; border-top: 1px dashed #ddd; padding-top: 8px; }
        .voice-btn { cursor: pointer; background: #28a745; border: none; font-size: 14px; color: white; padding: 4px 10px; border-radius: 20px; transition: 0.2s; }
        .voice-btn.ur-btn { background: #dc3545; }
        .voice-btn:active { transform: scale(0.95); opacity: 0.9; }

        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }

        @media (min-height: 600px) {
            .game-instruction { font-size: 22px; margin-bottom: 25px; }
        }
    </style>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ur', 
                includedLanguages: 'en,zh-CN,ru,fa,bn,ur,hi,ar,es,fr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>

<div class="page">
    <div id="google_translate_element"></div>

    <p class="game-instruction">Press 🔊 to Learn Cleaning Supplies (صفائی کا سامان)</p>
    
    <div id="mainPage" class="line-set"></div>
</div>

<script>
    const container = document.getElementById('mainPage');
    
    // शुद्ध उर्दू और इंग्लिश डेटा (चीनी भाषा यहाँ से हटा दी गई है)
    const cleaningData = [
        { num: 1, eng: "Broom", urdu: "جھاڑو", img: "images/01_broom.jpg" },
        { num: 2, eng: "Mop", urdu: "پوچھا", img: "images/02_mop.jpg" },
        { num: 3, eng: "Trash can", urdu: "کچرے کا ڈبہ", img: "images/03_trash_can.jpg" },
        { num: 4, eng: "Trash bag", urdu: "کچرے کا لفافہ", img: "images/04_trash_bag.jpg" },
        { num: 5, eng: "Cleaning cloth", urdu: "صفائی کا کپڑا", img: "images/05_cleaning_cloth.jpg" },
        { num: 6, eng: "Sponge", urdu: "اسفنج", img: "images/06_sponge.jpg" },
        { num: 7, eng: "Brush", urdu: "برش", img: "images/07_brush.jpg" },
        { num: 8, eng: "Dish soap", urdu: "برتن دھونے کا صابن", img: "images/08_dish_soap.jpg" },
        { num: 9, eng: "Cleaner", urdu: "صاف کرنے والا مائع", img: "images/09_cleaner.jpg" },
        { num: 10, eng: "Gloves", urdu: "دستانے", img: "images/10_gloves.jpg" },
        { num: 11, eng: "Dustpan", urdu: "خاک انداز", img: "images/11_dustpan.jpg" },
        { num: 12, eng: "Spray bottle", urdu: "سپرے بوتل", img: "images/12_spray_bottle.jpg" }
    ];

    // कार्ड बनाने का लूप
    cleaningData.forEach((item, index) => {
        const box = document.createElement('div');
        box.className = 'letter-box';

        box.innerHTML = `
            <div class="card-number notranslate">${item.num}</div>
            <span class="word-text notranslate">${item.eng}</span>
            <img class="img-box" src="${item.img}" alt="${item.eng}" onerror="this.onerror=null; this.src='https://placehold.co/90x90?text=No+Image'">
            <span class="urdu-meaning" id="text-meaning-${index}">${item.urdu}</span>
            <div class="voice-btn-container">
                <button class="voice-btn" onclick="speak('${item.eng}', 'en-US')">🔊 En</button>
                <button class="voice-btn ur-btn" onclick="speakDynamic(${index})">🔊 Voice</button>
            </div>
        `;
        container.appendChild(box);
    });

    // स्मार्ट वॉइस सिस्टम (ट्रांसलेटर बदलने पर आवाज़ भी बदलेगी)
    function speakDynamic(index) {
        const textElement = document.getElementById(`text-meaning-${index}`);
        const currentText = textElement.innerText || textElement.textContent;

        let detectedLang = 'ur-PK'; 
        let googleTranslateFrame = document.querySelector('.goog-te-menu-value');

        if (googleTranslateFrame) {
            const translatedLangText = googleTranslateFrame.textContent || '';
            if (translatedLangText.includes('Arabic') || translatedLangText.includes('عربية')) {
                detectedLang = 'ar-SA';
            } else if (translatedLangText.includes('Hindi') || translatedLangText.includes('हिन्दी')) {
                detectedLang = 'hi-IN';
            } else if (translatedLangText.includes('Persian') || translatedLangText.includes('فارسی')) {
                detectedLang = 'fa-IR';
            } else if (translatedLangText.includes('Russian') || translatedLangText.includes('русский')) {
                detectedLang = 'ru-RU';
            } else if (translatedLangText.includes('Bengali') || translatedLangText.includes('بنگالی')) {
                detectedLang = 'bn-IN';
            } else if (translatedLangText.includes('Chinese') || translatedLangText.includes('中文')) {
                detectedLang = 'zh-CN';
            } else if (translatedLangText.includes('Spanish') || translatedLangText.includes('Español')) {
                detectedLang = 'es-ES';
            } else if (translatedLangText.includes('French') || translatedLangText.includes('Français')) {
                detectedLang = 'fr-FR';
            } else if (translatedLangText.includes('English') || translatedLangText.includes('English')) {
                detectedLang = 'en-US';
            }
        } else {
            const htmlLang = document.documentElement.lang;
            if (htmlLang.startsWith('ar')) detectedLang = 'ar-SA';
            else if (htmlLang.startsWith('zh')) detectedLang = 'zh-CN';
            else if (htmlLang.startsWith('ru')) detectedLang = 'ru-RU';
            else if (htmlLang.startsWith('fa')) detectedLang = 'fa-IR';
            else if (htmlLang.startsWith('bn')) detectedLang = 'bn-IN';
            else if (htmlLang.startsWith('hi')) detectedLang = 'hi-IN';
            else if (htmlLang.startsWith('es')) detectedLang = 'es-ES';
            else if (htmlLang.startsWith('fr')) detectedLang = 'fr-FR';
            else if (htmlLang.startsWith('en')) detectedLang = 'en-US';
        }

        speak(currentText, detectedLang);
    }

    // बोलने का फंक्शन
    function speak(text, lang) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
