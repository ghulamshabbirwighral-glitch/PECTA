<!DOCTYPE html>
<html lang="ur">
<head>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4161884478253651" crossorigin="anonymous"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>میچنگ گیم - ٹچ سپورٹ کے ساتھ</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f4f8; padding: 10px; margin: 0; }
        .page { width: 95%; max-width: 1200px; margin: 0 auto; background-color: white; border: 1px solid #ccc; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .line-set { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        .letter-box { border: 2px solid #007bff; padding: 10px; border-radius: 12px; text-align: center; width: 130px; margin: 8px; background: white; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; }
        .capital { font-size: 38px; font-weight: bold; color: #2c3e50; display: block; line-height: 1.1; }
        .small { font-size: 22px; color: #555; display: block; margin-bottom: 5px; }
        .img-box { width: 75px; height: 75px; object-fit: contain; margin: 5px 0; }
        
        /* اسپیلنگ ٹیکسٹ کی اسٹائلنگ */
        .word-text { font-size: 16px; font-weight: bold; color: #28a745; display: block; margin: 4px 0; letter-spacing: 0.5px; }
        
        .voice-btn { cursor: pointer; background: #007bff; border: none; font-size: 20px; color: white; padding: 4px 12px; border-radius: 20px; margin-top: 5px; transition: 0.2s; }
        .voice-btn:active { background: #0056b3; transform: scale(0.95); }
    </style>
</head>
<body>

<div class="page" id="mainPage"></div>

<script>
    const container = document.getElementById('mainPage');
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    
    const images = {
        A: "apple.png", B: "ball.png", C: "cat.png", D: "dog.png", E: "egg.png",
        F: "fish.png", G: "goat.png", H: "hat.png", I: "ice.png", J: "jug.png",
        K: "kite.png", L: "lion.png", M: "mango.png", N: "nest.png", O: "owl.png",
        P: "pen.png", Q: "queen.png", R: "rat.png", S: "sun.png", T: "tap.png",
        U: "umbrella.png", V: "van.png", W: "watch.png", X: "xray.png", Y: "yoyo.png", Z: "zebra.png"
    };

    const words = {
        A: "Apple", B: "Ball", C: "Cat", D: "Dog", E: "Egg",
        F: "Fish", G: "Goat", H: "Hat", I: "Ice", J: "Jug",
        K: "Kite", L: "Lion", M: "Mango", N: "Nest", O: "Owl",
        P: "Pen", Q: "Queen", R: "Rat", S: "Sun", T: "Tap",
        U: "Umbrella", V: "Van", W: "Watch", X: "Xray", Y: "Yoyo", Z: "Zebra"
    };

    // آواز والا فنکشن جو اب اسپیلنگ بھی بولے گا
    function speakLetter(char) {
        window.speechSynthesis.cancel(); // پرانی آواز کو روکنے کے لیے
        
        const word = words[char];
        // ہجے کرنے کے لیے حروف کے درمیان فاصلہ اور کوما لگایا تاکہ وہ الگ الگ بولے (جیسے A, P, P, L, E)
        const spelling = word.split("").join(", "); 
        
        // مکمل جملہ: "A for Apple... A, P, P, L, E"
        const textToSpeak = `${char} for ${word}. . ${spelling}`;
        
        const msg = new SpeechSynthesisUtterance(textToSpeak);
        msg.lang = 'en-US';
        msg.rate = 0.85; // آواز کی رفتار تھوڑی آہستہ کی تاکہ بچے آسانی سے ہجے سمجھ سکیں
        window.speechSynthesis.speak(msg);
    }

    let currentLine = document.createElement('div');
    currentLine.className = 'line-set';
    container.appendChild(currentLine);

    alphabet.forEach((char, index) => {
        const div = document.createElement('div');
        div.className = 'letter-box';
        
        // یہاں امیج کے نیچے <span class="word-text"> کے ذریعے اسپیلنگ ایڈ کی گئی ہے
        div.innerHTML = `
            <span class="capital">${char}</span>
            <span class="small">${char.toLowerCase()}</span>
            <img src="images/${images[char]}" class="img-box" onerror="this.src='https://via.placeholder.com/80?text=No+Img'">
            <span class="word-text">${words[char]}</span>
            <button class="voice-btn" onclick="speakLetter('${char}')">🔊</button>
        `;
        currentLine.appendChild(div);

        // ہر 6 باکسز کے بعد نئی لائن بنانا
        if ((index + 1) % 6 === 0) {
            currentLine = document.createElement('div');
            currentLine.className = 'line-set';
            container.appendChild(currentLine);
        }
    });
</script>
</body>
</html>
