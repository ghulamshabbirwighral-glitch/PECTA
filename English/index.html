    <title>English Learning Dashboard</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 40px 15px; 
            background: #f8f9fa; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { 
            color: #343a40; 
            font-size: 26px;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            margin-bottom: 30px;
            color: #495057;
        }
        /* बटनों को एक کے نیچے ایک اور خوبصورت دکھانے کے لیے کنٹینر */
        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        /* बटन का नया साइज और लुक जो मोबाइल पर बड़ा और साफ़ दिखेगा */
        .nav-btn { 
            width: 90%; 
            max-width: 550px; /* डेस्कटॉप पर बटन को बहुत ज़्यादा फैलने से रोकेगा */
            padding: 18px 24px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold;
            border-radius: 10px; 
            border: none; 
            background: #007bff; /* انگلش کے لیے نیلا رنگ */
            color: white; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s ease-in-out;
            line-height: 1.4;
        }
        /* डेस्कटॉप पर माउस ले जाने का इफेक्ट */
        @media (hover: hover) {
            .nav-btn:hover { 
                background: #0069d9; 
                transform: translateY(-2px);
                box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            }
        }
        /* मोबाइल पर टच करने का इफेक्ट (Active State) */
        .nav-btn:active {
            transform: scale(0.98);
            background: #0056b3;
        }
    </style>
    <meta name="description" content="English Learning for kids. Practice alphabets, phonics, and basic English concepts on Wighral Education.">

</head>
<body>

    <h1>English Learning Dashboard</h1>
    <p>Select a module to open in a new full-screen window:</p>
    
    <div class="btn-container">
        <button class="nav-btn" onclick="openFullscreen('EngAl18.html')">English Alphabets Learning for Kids</button>
        <button class="nav-btn" onclick="openFullscreen('Engalph.html')">English Phonics Learning for Kids</button>
    </div>
    
    <script>
        function openFullscreen(fileName) {
            window.open(fileName, '_blank', 'width=' + screen.width + ',height=' + screen.height + ',resizable=yes,scrollbars=yes');
        }
    </script>
</body>
