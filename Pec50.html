        "Comma (,)": { 
            def: "Used to indicate a short pause in a sentence.", 
            ur: "کوما: جملے میں تھوڑا وقفہ لینے کے لیے استعمال ہوتا ہے۔", 
            ex: ["Ali, Ahmed, and Raza are friends. (علی، احمد اور رضا دوست ہیں۔)"] 
        },
        "Question Mark (?)": { 
            def: "Used at the end of a direct question.", 
            ur: "سوالیہ نشان: براہِ راست سوال پوچھنے کے بعد لگایا جاتا ہے۔", 
            ex: ["What is your name? (آپ کا نام کیا ہے؟)", "Where do you live? (آپ کہاں رہتے ہیں؟)"] 
        },
        "Exclamation (!)": { 
            def: "Used to express strong emotion or surprise.", 
            ur: "ندائیہ نشان: شدید جذبات یا حیرت کے اظہار کے لیے۔", 
            ex: ["Wow! What a beautiful day. (واہ! کیا خوبصورت دن ہے۔)"] 
        },
        "Colon (:)": { 
            def: "Used to introduce a list or an explanation.", 
            ur: "کولن: فہرست شروع کرنے یا وضاحت دینے کے لیے۔", 
            ex: ["You need three things: pen, book, and bag."] 
        },
        "Semicolon (;)": { 
            def: "Used to join two related independent sentences.", 
            ur: "سیمی کولن: دو آپس میں متعلقہ جملوں کو جوڑنے کے لیے۔", 
            ex: ["I am tired; I will sleep now."] 
        },
        "Apostrophe (')": { 
            def: "Used to show possession or missing letters.", 
            ur: "اپوسٹروف: ملکیت ظاہر کرنے یا الفاظ کو مختصر کرنے کے لیے۔", 
            ex: ["Ali's book (علی کی کتاب)", "It's (It is)"] 
        },
        "Quotation Marks (\")": { 
            def: "Used to enclose direct speech or someone's exact words.", 
            ur: "کوٹیشن مارکس: کسی کے کہے ہوئے الفاظ کو درج کرنے کے لیے۔", 
            ex: ['He said, "I am happy." (اس نے کہا، "میں خوش ہوں۔")'] 
        },
        "Diphthongs": { 
            def: "A sound formed by the combination of two vowel sounds.", 
            ur: "ڈفتھانگ: ایک ہی آواز میں دو وول ساؤنڈز کا ملاپ۔", 
            ex: ["Coin (oy)", "Loud (ou)", "Face (ei)"] 
        },
                "Triphthongs": { 
            def: "A sound formed by the combination of three vowel sounds.", 
            ur: "ٹرف تھانگ: ایک ہی آواز میں تین وول ساؤنڈز کا ملاپ۔", 
            ex: ["Fire (ai-uh)", "Hour (au-uh)", "Player (ei-uh)"] 
        } 
    }; // یہاں پر ابجیکٹ صحیح طریقے سے بند ہو رہا ہے
  
  
      const menu = document.getElementById('menu');
    Object.keys(topics).forEach(t => {
        let btn = document.createElement('button');
        btn.className = 'topic-btn';
        btn.innerText = t;
                btn.onclick = () => {
            document.getElementById('v-title').innerText = t;
            document.getElementById('def-en').innerText = topics[t].def;
            document.getElementById('def-ur').innerText = topics[t].ur;
            document.getElementById('ex-content').innerHTML = topics[t].ex.map(e => `<div class="ex-item">${e}</div>`).join('');
            
            // یہ لائن مینیو کو غائب کر دے گی
            document.getElementById('menu').style.display = 'none'; 
            
            // یہ لائن ویور کو دکھائے گی
            document.getElementById('viewer').style.display = 'flex';
        };
      
        menu.appendChild(btn);
    });

        
              function hideViewer() { 
            // ویوور کو چھپائیں
            document.getElementById('viewer').style.display = 'none'; 
            
            // مینیو کو دوبارہ دکھائیں
            document.getElementById('menu').style.display = 'flex'; 
              }
  
  
  
</script>
