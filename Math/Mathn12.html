<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Practice Board</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; background: #f4f4f4; margin: 0; }
       .board { border: 2px solid #555; padding: 15px; display: block; margin: 20px auto; border-radius: 15px; background: white; width: 90%; max-width: 400px; box-sizing: border-box; }
        .math-row { display: flex; flex-direction: row-reverse; justify-content: center; font-size: 28px; font-weight: bold; margin: 10px 0; }
        .cell { width: 35px; text-align: center; font-size: 20px; margin: 0 2px; }
        .btn { padding: 12px; margin: 5px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
    </style>
</head>
<body>

    <h1>Practice Board</h1>
    <button class="btn" onclick="setMode('+')">Addition</button>
    <button class="btn" onclick="setMode('-')">Subtraction</button>
    <button class="btn" onclick="setMode('*')">Multiplication</button>

    <div class="board" id="board" style="display:none; margin-top:20px;">
        <div id="topNums" class="math-row"></div>
        <div id="bottomNums" class="math-row"></div>
        <div style="border-bottom: 3px solid #000; width: 150px; margin: 10px auto;"></div>
        <div class="math-row" id="ansInputs"></div>
        <br>
        <button class="btn" onclick="checkAnswer()">Check Answer</button>
        <button class="btn" onclick="reAttempt()">Re-attempt</button>
        <button class="btn" style="background:#ffcc00;" onclick="nextQuestion()">Next / Skip</button>
        <p id="result"></p>
        <div id="numpad"></div>
    </div>

    <script>
        let currentMode = '+';
        let currentIndex = 0;
        let inputs = [];
        let focusIdx = 0;
        
        const questions = {
            '+': Array.from({length: 50}, () => {
                let n1 = Math.floor(Math.random() * 900) + 10;
                let n2 = Math.floor(Math.random() * 900) + 10;
                return {n1, n2, ans: n1 + n2};
            }),
            '-': Array.from({length: 50}, () => {
                let n1 = Math.floor(Math.random() * 900) + 100;
                let n2 = Math.floor(Math.random() * (n1 - 10)) + 10;
                return {n1, n2, ans: n1 - n2};
            }),
            '*': Array.from({length: 50}, () => {
                let n1 = Math.floor(Math.random() * 90) + 10;
                let n2 = Math.floor(Math.random() * 8) + 2;
                return {n1, n2, ans: n1 * n2};
            })
        };

        function setMode(mode) { 
            currentMode = mode; 
            currentIndex = 0; 
            focusIdx = 0; 
            loadQuestion(); 
        }

        function loadQuestion() {
            document.getElementById('board').style.display = 'block';
            let q = questions[currentMode][currentIndex];
            document.getElementById('topNums').innerText = q.n1;
            let sign = (currentMode === '*') ? '×' : currentMode;
            document.getElementById('bottomNums').innerText = sign + " " + q.n2;
            
            let ansDiv = document.getElementById('ansInputs');
            ansDiv.innerHTML = ""; 
            inputs = [];
            focusIdx = 0;
            
            let ansString = q.ans.toString();
            for(let i=0; i<ansString.length; i++) {
                let inp = document.createElement('input');
                inp.className = "cell"; inp.maxLength = 1; inp.readOnly = true;
                ansDiv.appendChild(inp); 
                inputs.push(inp);
            }
            document.getElementById('result').innerText = "";
            renderNumpad();
        }

        function renderNumpad() {
            let pad = document.getElementById('numpad'); 
            pad.innerHTML = "";
            for(let i=0; i<=9; i++) pad.innerHTML += `<button class="btn" onclick="inputDigit('${i}')">${i}</button>`;
        }

        function inputDigit(d) {
            if(focusIdx < inputs.length) { 
                inputs[focusIdx].value = d; 
                focusIdx++; 
            }
        }

        // صرف موجودہ سوال کے خانوں کو خالی کرتا ہے
        function reAttempt() {
            inputs.forEach(inp => inp.value = "");
            focusIdx = 0;
            document.getElementById('result').innerText = "";
        }

        function checkAnswer() {
            let userVal = "";
            inputs.forEach(inp => userVal += inp.value);
            
            let resultBox = document.getElementById('result');
            let correctAnswer = questions[currentMode][currentIndex].ans;

            if(userVal !== "" && parseInt(userVal) === correctAnswer) {
                resultBox.innerHTML = "<b style='color:green;'>Correct! 🎉</b>";
            } else {
                resultBox.innerHTML = `<b style='color:red;'>Wrong! Correct: ${correctAnswer}</b>`;
            }
        }

        function nextQuestion() {
            currentIndex = (currentIndex + 1) % 50;
            focusIdx = 0;
            loadQuestion();
        }
    </script>
</body>
</html>
