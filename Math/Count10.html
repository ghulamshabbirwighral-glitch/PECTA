<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta name="description" content="Learn Counting">
    <meta name="keywords" content=" School Maths Counting">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4NHR43XLF6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4NHR43XLF6');
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4161884478253651" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>1 سے 100 تک گنتی</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background-color: #f4f4f4; margin: 0; }
        .main-container {
            background: white;
            padding: 20px 15px;
            border-radius: 20px;
            border: 2px solid #ccc;
            width: 95%;
            max-width: 1200px;
            margin: 10px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        
        /* گوگل ٹرانسلیٹ باکس کی اسٹائلنگ */
        #google_translate_element {
            text-align: center;
            margin-bottom: 15px;
        }

        /* گنتی سیکھنے کی ہدایت (Instruction Text) کی اسٹائلنگ */
        .game-instruction {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            margin: 5px auto 20px auto;
            max-width: 600px;
            line-height: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1.2fr 0.8fr; 
            text-align: center;
        }
        .list { list-style: none; padding: 0; margin: 0; }
        .list li {
            height: 55px; 
            display: flex;
            align-items: center; 
            justify-content: center; 
            font-size: 19px;
            border-bottom: 1px solid #ddd;
        }
        h3 { font-size: 22px; border-bottom: 3px solid #333; padding-bottom: 15px; margin-bottom: 0; }

        /* وائس بٹن کی اسٹائلنگ */
        .eng-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        .voice-btn {
            cursor: pointer;
            background: #007bff;
            border: none;
            font-size: 16px;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            transition: 0.2s;
            line-height: 1;
        }
        .voice-btn:active {
            background: #0056b3;
            transform: scale(0.90);
        }

        /* ٹرانسلیٹ بینر کو چھپانے کے لیے */
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }

        @media (min-height: 600px) {
            .game-instruction { font-size: 22px; margin-bottom: 25px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 style="text-align: center; margin-bottom: 15px; font-size: 28px;">1 سے 100 تک گنتی</h1>
        
        <div id="google_translate_element"></div>

        <p class="game-instruction">Press 🔊 to Learn Counting</p>

        <div class="content">
            <div class="translate-me">
                <h3>اردو گنتی</h3>
                <ul class="list" id="urduList"></ul>
            </div>
            
            <div class="notranslate">
                <h3>English</h3>
                <ul class="list" id="engList"></ul>
            </div>
            
            <div class="notranslate">
                <h3>ہندسے</h3>
                <ul class="list" id="numList"></ul>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ur',
                includedLanguages: 'en,hi,ar,fr,es,de,zh-CN,fa,bn,it,ru',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const units = ["", "ایک", "دو", "تین", "چار", "پانچ", "چھ", "سات", "آٹھ", "نو", "دس", "گیارہ", "بارہ", "تیرہ", "چودہ", "پندرہ", "سولہ", "سترہ", "اٹھارہ", "انیس", "بیس"];
        const specialUrdu = { 21:"اکیس", 22:"بائیس", 23:"تیئیس", 24:"چوبیس", 25:"پچیس", 26:"چھبیس", 27:"ستائیس", 28:"اٹھائیس", 29:"انتیس", 30:"تیس", 31:"اکتیس", 32:"بتیس", 33:"تینتیس", 34:"چونتیس", 35:"پینتیس", 36:"چھتیس", 37:"سینتیس", 38:"اڑتیس", 39:"انتالیس", 40:"چالیس", 41:"اکتالیس", 42:"بیالیس", 43:"تینتالیس", 44:"چوالیس", 45:"پینتالیس", 46:"چھیالیس", 47:"سینتالیس", 48:"اڑتالیس", 49:"انچاس", 50:"پچاس", 51:"اکاون", 52:"باون", 53:"ترپن", 54:"چون", 55:"پچپن", 56:"چھپن", 57:"ستاون", 58:"اٹھاون", 59:"انسٹھ", 60:"ساٹھ", 61:"اکسٹھ", 62:"باسٹھ", 63:"ترسٹھ", 64:"چونسٹھ", 65:"پینسٹھ", 66:"چھیاسٹھ", 67:"سڑسٹھ", 68:"اڑسٹھ", 69:"انہتر", 70:"ستر", 71:"اکہتر", 72:"بہتر", 73:"تہتر", 74:"چہتر", 75:"پچھتر", 76:"چھہتر", 77:"ستتر", 78:"اٹھتر", 79:"اناسی", 80:"اسی", 81:"اکیاسی", 82:"bیاسی", 83:"تراسی", 84:"چوراسی", 85:"پچاسی", 86:"چھیاسی", 87:"ستاسی", 88:"اٹھاسی", 89:"نواسی", 90:"نوے", 91:"اکانوے", 92:"بانوے", 93:"ترانوے", 94:"چورانوے", 95:"پچانوے", 96:"چھیانوے", 97:"ستانوے", 98:"اٹھانوے", 99:"ننانوے", 100:"سو" };
        
        function getUrdu(n) { return (n <= 20) ? units[n] : specialUrdu[n]; }
        const engUnits = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen", "Twenty"];
        const engTens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety", "Hundred"];

        function getEng(n) {
            if (n <= 20) return engUnits[n];
            if (n === 100) return "One Hundred";
            let t = Math.floor(n / 10);
            let u = n % 10;
            return engTens[t] + (u !== 0 ? "-" + engUnits[u] : "");
        }

        function speakCounting(word) {
            window.speechSynthesis.cancel(); 
            const cleanWord = word.replace("-", " ");
            const spelling = cleanWord.split("").join(", "); 
            const textToSpeak = `${word}. . . ${spelling}`;
            
            const msg = new SpeechSynthesisUtterance(textToSpeak);
            msg.lang = 'en-US';
            msg.rate = 0.80; 
            window.speechSynthesis.speak(msg);
        }

        for(let i = 1; i <= 100; i++) {
            const engWord = getEng(i);
            document.getElementById('numList').innerHTML += `<li>${i}</li>`;
            document.getElementById('engList').innerHTML += `
                <li>
                    <div class="eng-item">
                        <span>${engWord}</span>
                        <button class="voice-btn" onclick="speakCounting('${engWord}')">🔊</button>
                    </div>
                </li>`;
            document.getElementById('urduList').innerHTML += `<li>${getUrdu(i)}</li>`;
        }
    </script>
</body>
</html>
