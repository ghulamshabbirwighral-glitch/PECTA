<!DOCTYPE html>
<html>
<head>
    <meta name="description" content=" Basic Mathematics Section. Learn and practice school-level maths with easy modules.">
    <meta name="keywords" content="Mathematics, School Maths, Basic Math, Math Practice">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4NHR43XLF6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-4NHR43XLF6');
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4161884478253651" crossorigin="anonymous"></script>
    
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Math Dashboard</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 40px 15px; 
            background: #e9ecef; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 12px;
            color: #212529;
        }
        p {
            font-size: 16px;
            margin-bottom: 30px;
            color: #495057;
        }
        /* बटनों को एक के नीचे एक और सुंदर दिखाने के लिए कंटेनर */
        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        /* बटन का नया साइज और लुक जो मोबाइल पर बड़ा और साफ़ दिखेगा */
        .nav-btn { 
            width: 90%; 
            max-width: 550px; /* डेस्कटॉप पर बटन को बहुत ज़्यादा फैलने से रोकेगा */
            padding: 18px 24px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold;
            border-radius: 10px; 
            border: none; 
            background: #28a745; 
            color: white; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s ease-in-out;
            line-height: 1.4;
        }
        /* डेस्कटॉप पर माउस ले जाने का इफेक्ट */
        @media (hover: hover) {
            .nav-btn:hover { 
                background: #218838; 
                transform: translateY(-2px);
                box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            }
        }
        /* मोबाइल पर टच करने का इफेक्ट */
        .nav-btn:active {
            transform: scale(0.98);
            background: #1e7e34;
        }
    </style>
    
    <meta name="description" content="Basic Math Learning for school students. Practice simple mathematics, arithmetic, and essential math concepts on Wighral Education.">
    <meta name="keywords" content="Basic Math, Math Learning, Arithmetic, School Math, Math Practice, Wighral Education">
</head>
<body>

    <h1>Math Learning Dashboard</h1>
    <p>Select a module to open in a new full-screen window:</p>
    
    <div class="btn-container">
        <button class="nav-btn" onclick="openFullscreen('Count10.html')">Learn Counting in Digits,English and your Native Lag</button>
        <button class="nav-btn" onclick="openFullscreen('Countp1.html')">Counting Exercise or Practice</button>
        <button class="nav-btn" onclick="openFullscreen('Math3.html')">Basic Math Practice Primary</button>
        <button class="nav-btn" onclick="openFullscreen('Mathn12.html')">Advance Math Practice Primary</button>
        <button class="nav-btn" onclick="openFullscreen('Mathmul2.html')">Advance Math Multiplication upto 3 to 4 digits Practice Primary</button>
    </div>

    <script>
        function openFullscreen(fileName) {
            // _blank का मतलब है नई विंडो/टैब में खोलना
            // fullscreen=yes सभी ब्राउज़र्स पर काम नहीं करता, इसलिए हम इसे मैक्सिमाइज्ड खोलने की कोशिश करते हैं
            window.open(fileName, '_blank', 'width=' + screen.width + ',height=' + screen.height + ',resizable=yes,scrollbars=yes');
        }
    </script>
</body>
</html>
