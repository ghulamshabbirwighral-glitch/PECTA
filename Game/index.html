<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gaming Hub</title>
    <!-- Google AdSense Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9404946681115603" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #e9ecef; margin: 0; padding: 10px; }
        h1 { color: #333; margin-bottom: 15px; }
        .tab-button { padding: 12px 20px; cursor: pointer; margin: 5px; border: none; background: linear-gradient(45deg, #007bff, #0056b3); color: white; font-size: 14px; font-weight: bold; border-radius: 50px; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-button:hover { background: linear-gradient(45deg, #0056b3, #004494); transform: translateY(-2px); }
        
        /* یہاں ہم نے height کو 65vh سے بڑھا کر 80vh کر دیا ہے */
        #game-frame { width: 100%; height: 80vh; border: 3px solid #333; margin-top: 15px; background-color: white; border-radius: 10px; }
        
        .ad-container { margin-top: 15px; width: 100%; min-height: 100px; }
    </style>
</head>
<body>

    <h1>My Games</h1>

    <button class="tab-button" onclick="loadGame('Finalpro5.html')">Game 1</button>
    <button class="tab-button" onclick="loadGame('M10.html')">Game 2</button>
    <button class="tab-button" onclick="loadGame('M23.html')">Game 3</button>
    <button class="tab-button" onclick="loadGame('Match9nine.html')">Game 4</button>

    <br>
    <iframe id="game-frame" src="about:blank" frameborder="0"></iframe>

    <!-- Ad Unit -->
    <div class="ad-container">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-9404946681115603"
             data-ad-slot="6620446915"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script>
        function loadGame(url) {
            document.getElementById('game-frame').src = url;
        }
    </script>

</body>
</html>
