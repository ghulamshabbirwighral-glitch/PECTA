<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Collector Pro - Optimized View</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; font-family: sans-serif; }
        
        #gameArea { 
            width: 400px; height: 600px; /* अपडेटेड साइज */
            background: linear-gradient(180deg, #fff5e6 0%, #ffeef2 100%); 
            border: 5px solid #fff; 
            position: relative; overflow: hidden; cursor: crosshair; 
        }
        
        #pauseBtn { position: absolute; top: 10px; right: 10px; z-index: 25; padding: 8px 15px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        
        #bgCounter { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; color: #2ecc71; opacity: 0.2; pointer-events: none; transition: color 0.3s; }
        #textCounter { position: absolute; top: 60px; width: 100%; text-align: center; font-size: 20px; font-weight: 800; color: #2ecc71; pointer-events: none; transition: color 0.3s; }
        
        #scoreBoard { padding: 10px; font-weight: bold; position: relative; z-index: 5; background: rgba(255, 255, 255, 0.6); font-size: 16px; }
        
        #basket { width: 90px; height: 50px; background: rgba(255, 255, 255, 0.7); border: 2px solid #333; position: absolute; bottom: 20px; left: 155px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; z-index: 10; display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start; padding: 3px; overflow: hidden; }
        
        .in-basket { font-size: 16px; margin: 1px; }
        
        #fruit { width: 35px; height: 35px; position: absolute; font-size: 30px; top: -50px; z-index: 5; pointer-events: none; }
        
        .screen { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 20; text-align: center; }
        button { padding: 12px 25px; font-size: 18px; cursor: pointer; background: #2ecc71; border: none; color: white; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="gameArea">
    <button id="pauseBtn" onclick="togglePause()">Pause</button>
    <div id="bgCounter">0</div>
    <div id="textCounter">
        <div id="engText">Zero</div>
        <div id="urduText">صفر</div>
    </div>
    <div id="scoreBoard">Score: <span id="score">0</span></div>
    <div id="fruit">🍎</div>
    <div id="basket"></div>

    <div id="startScreen" class="screen">
        <h1>Fruit Collector</h1>
        <button onclick="startGame()">Play Game</button>
    </div>

    <div id="winScreen" class="screen" style="display:none;">
        <h1>Congratulations!</h1>
        <div style="font-size: 60px;">🪙</div>
        <p>You collected 100 fruits!</p>
        <button onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
    const gameArea = document.getElementById('gameArea');
    const basket = document.getElementById('basket');
    const fruit = document.getElementById('fruit');
    const bgCounter = document.getElementById('bgCounter');
    const engText = document.getElementById('engText');
    const urduText = document.getElementById('urduText');
    const startScreen = document.getElementById('startScreen');
    const winScreen = document.getElementById('winScreen');
    const pauseBtn = document.getElementById('pauseBtn');
    
    const colors = ["#2ecc71", "#3498db", "#e74c3c", "#f1c40f", "#9b59b6", "#e67e22", "#1abc9c", "#34495e", "#c0392b", "#d35400"];
    const fruitList = ["🍎","🍊","🍇","🍉","🍓","🍌","🍍","🍒","🍑","🥑"];
    const urduWords = ["صفر", "ایک", "دو", "تین", "چار", "پانچ", "چھ", "سات", "آٹھ", "نو", "دس", "گیارہ", "بارہ", "تیرہ", "چودہ", "پندرہ", "سولہ", "سترہ", "اٹھارہ", "انیس", "بیس", "اکیس", "بائیس", "تیئیس", "چوبیس", "پچیس", "چھبیس", "ستائیس", "اٹھائیس", "انتیس", "تیس", "اکتیس", "بتیس", "تینتیس", "چونتیس", "پینتیس", "چھتیس", "سینتیس", "اڑتیس", "انتالیس", "چالیس", "اکتالیس", "بیالیس", "تینتالیس", "چوالیس", "پینتالیس", "چھیالیس", "سینتالیس", "اڑتالیس", "انچاس", "پچاس", "اکیاون", "باون", "ترپن", "چون", "پچپن", "چھپن", "ستاون", "اٹھاون", "انسٹھ", "ساٹھ", "اکسٹھ", "باسٹھ", "تریسٹھ", "چونسٹھ", "پینسٹھ", "چھیاسٹھ", "سڑسٹھ", "اڑسٹھ", "انہتر", "ستر", "اکیہتر", "بہتر", "تہتر", "چوہتر", "پچھتر", "چھہتر", "ستتر", "اٹھتر", "اناسی", "اسی", "اکیاسی", "بیاسی", "تراسی", "چوراسی", "پچاسی", "چھیاسی", "ستاسی", "اٹھاسی", "نواسی", "نوے", "اکانوے", "بانوے", "ترانوے", "چورانوے", "پچانوے", "چھیا نوے", "ستانوے", "اٹھانوے", "ننانوے", "سو"];

    let score = 0, fruitY = -50, fruitX = 180, speed = 4.0, isPaused = true;

    function speakNumber(num) {
        if (num >= 1 && num <= 100) {
            const audio = new Audio(`audio/${num}.mp3`);
            audio.play().catch(e => console.log("Audio Error:", e));
        }
    }

    function getNumberWords(n) {
        const units = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
        const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
        let eStr = (n === 100) ? "One Hundred" : (n < 20 ? units[n] : tens[Math.floor(n/10)] + (n % 10 !== 0 ? "-" + units[n % 10] : ""));
        return { e: eStr, u: urduWords[n] };
    }

    function togglePause() {
        isPaused = !isPaused;
        pauseBtn.innerText = isPaused ? "Resume" : "Pause";
        if (!isPaused) requestAnimationFrame(gameLoop);
    }

    function startGame() { startScreen.style.display = 'none'; isPaused = false; gameLoop(); }

    function resetGame() {
        score = 0; fruitY = -50; basket.innerHTML = "";
        document.getElementById('score').innerText = "0";
        bgCounter.innerText = "0";
        engText.innerText = "Zero";
        urduText.innerText = "صفر";
        winScreen.style.display = 'none';
        isPaused = false;
        gameLoop();
    }

    function moveBasket(clientX) {
        if (isPaused) return;
        const rect = gameArea.getBoundingClientRect();
        let x = clientX - rect.left - 45; 
        // 400 (Width) - 90 (Basket Width) = 310
        basket.style.left = Math.max(0, Math.min(310, x)) + 'px';
    }

    gameArea.addEventListener('mousemove', (e) => moveBasket(e.clientX));
    gameArea.addEventListener('touchmove', (e) => { moveBasket(e.touches[0].clientX); e.preventDefault(); }, {passive: false});

    function gameLoop() {
        if (isPaused) return;
        fruitY += speed;
        fruit.style.top = fruitY + 'px';
        fruit.style.left = fruitX + 'px';

        // Collision detection and reset logic
        if (fruitY > 550) { 
            let bLeft = parseInt(basket.style.left);
            if (fruitX + 35 > bLeft && fruitX < bLeft + 90) {
                score++;
                speakNumber(score);
                document.getElementById('score').innerText = score;
                bgCounter.innerText = score;
                let words = getNumberWords(score);
                engText.innerText = words.e;
                urduText.innerText = words.u;
                
                let colorIndex = Math.floor(score / 10) % colors.length;
                bgCounter.style.color = colors[colorIndex];
                textCounter.style.color = colors[colorIndex];
                
                if (score % 10 === 0) { basket.innerHTML = ""; fruit.innerText = fruitList[(score / 10) % fruitList.length]; }
                else { let icon = document.createElement("span"); icon.className = "in-basket"; icon.innerText = fruit.innerText; basket.appendChild(icon); }
            }
            if (score >= 100) { isPaused = true; winScreen.style.display = 'flex'; return; }
            fruitY = -50; fruitX = Math.random() * 360; // 400 - 40
        }
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
