<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اردو گنتی میچنگ</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 5px; touch-action: none; overflow: hidden; }
        .counter-box { font-size: 16px; font-weight: bold; margin: 5px; padding: 5px; background: white; border-radius: 8px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* فریم کو چھوٹا کرنے کے لیے height کم کر دی گئی ہے */
        .game-container { position: relative; display: flex; justify-content: space-around; padding: 10px; height: 400px; max-width: 600px; margin: auto; }
        .col { display: flex; flex-direction: column; gap: 8px; z-index: 5; }
        
        /* بٹن کا سائز بھی تھوڑا کم کر دیا ہے */
        .item { width: 120px; height: 40px; border: 2px solid #007bff; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10; }
        
        #feedback { font-size: 60px; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; pointer-events: none; }
        
        #win-message { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; color: white; flex-direction: column; align-items: center; justify-content: center; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #28a745; color: white; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="counter-box">
        درست: <span id="correct">0</span> | غلط: <span id="wrong">0</span>
    </div>
    
    <div id="feedback"></div>

    <div id="win-message">
        <h1>🎉 بہت خوب! 🎉</h1>
        <button onclick="location.reload()">دوبارہ کھیلیں</button>
    </div>

    <div class="game-container" id="container">
        <canvas id="lineCanvas"></canvas>
        <div class="col" id="left-col"></div>
        <div class="col" id="right-col"></div>
    </div>

    <script>
        const data = [
            {id: 1, ur: "ایک", en: "One"}, {id: 2, ur: "دو", en: "Two"}, 
            {id: 3, ur: "تین", en: "Three"}, {id: 4, ur: "چار", en: "Four"}, 
            {id: 5, ur: "پانچ", en: "Five"}, {id: 6, ur: "چھ", en: "Six"}, 
            {id: 7, ur: "سات", en: "Seven"}, {id: 8, ur: "آٹھ", en: "Eight"}, 
            {id: 9, ur: "نو", en: "Nine"}, {id: 10, ur: "دس", en: "Ten"}
        ];

        let correct = 0, wrong = 0;
        let isDrawing = false;
        let startItem = null;
        let currentPos = {x: 0, y: 0};
        
        const canvas = document.getElementById('lineCanvas');
        const ctx = canvas.getContext('2d');
        const lines = [];

        function initGame() {
            const leftCol = document.getElementById('left-col');
            const rightCol = document.getElementById('right-col');
            const shuffledLeft = [...data].sort(() => Math.random() - 0.5);
            const shuffledRight = [...data].sort(() => Math.random() - 0.5);

            shuffledLeft.forEach(item => {
                let div = document.createElement('div');
                div.className = 'item'; div.innerText = item.id; div.dataset.id = item.id;
                leftCol.appendChild(div);
            });

            shuffledRight.forEach(item => {
                let div = document.createElement('div');
                div.className = 'item'; div.innerText = item.ur + " - " + item.en; div.dataset.id = item.id;
                rightCol.appendChild(div);
            });
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            lines.forEach(l => drawLine(l.start, l.end, 'green'));
            if (isDrawing && startItem) {
                const rect = startItem.getBoundingClientRect();
                const containerRect = document.getElementById('container').getBoundingClientRect();
                ctx.strokeStyle = '#007bff'; ctx.lineWidth = 4; ctx.beginPath();
                ctx.moveTo(rect.right - containerRect.left, rect.top + rect.height/2 - containerRect.top);
                ctx.lineTo(currentPos.x - containerRect.left, currentPos.y - containerRect.top);
                ctx.stroke();
            }
            requestAnimationFrame(render);
        }

        function drawLine(el1, el2, color) {
            const rect1 = el1.getBoundingClientRect();
            const rect2 = el2.getBoundingClientRect();
            const containerRect = document.getElementById('container').getBoundingClientRect();
            ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.beginPath();
            ctx.moveTo(rect1.right - containerRect.left, rect1.top + rect1.height/2 - containerRect.top);
            ctx.lineTo(rect2.left - containerRect.left, rect2.top + rect2.height/2 - containerRect.top);
            ctx.stroke();
        }

        function start(e) { if(e.target.classList.contains('item')) { isDrawing = true; startItem = e.target; } }
        function move(e) { if (!isDrawing) return; const touch = e.touches ? e.touches[0] : e; currentPos = {x: touch.clientX, y: touch.clientY}; }

        function end(e) {
            if (!isDrawing) return;
            const touch = e.changedTouches ? e.changedTouches[0] : e;
            const endItem = document.elementFromPoint(touch.clientX, touch.clientY);
            if (endItem && endItem.classList.contains('item') && endItem !== startItem && startItem.dataset.id === endItem.dataset.id) {
                lines.push({start: startItem, end: endItem});
                correct++;
                document.getElementById('correct').innerText = correct;
                showFeedback("✅");
                if (correct === 10) setTimeout(() => { document.getElementById('win-message').style.display = 'flex'; }, 1000);
            } else { wrong++; document.getElementById('wrong').innerText = wrong; showFeedback("❌"); }
            isDrawing = false; startItem = null;
        }

        document.body.addEventListener('mousedown', start);
        document.body.addEventListener('touchstart', start);
        document.body.addEventListener('mousemove', move);
        document.body.addEventListener('touchmove', move);
        document.body.addEventListener('mouseup', end);
        document.body.addEventListener('touchend', end);

        function showFeedback(icon) {
            const f = document.getElementById('feedback');
            f.innerText = icon; f.style.display = 'block';
            setTimeout(() => f.style.display = 'none', 800);
        }

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initGame();
        render();
    </script>
</body>
</html>
