<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4NHR43XLF6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4NHR43XLF6');
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4161884478253651" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>گنتی میچنگ گیم</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 2px; touch-action: none; overflow: hidden; }
        
        /* انسٹرکشن ٹیکسٹ کا مارجن مزید کم کیا تاکہ اوپر جگہ بچے */
        .game-instruction {
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            margin: 2px auto;
            max-width: 600px;
            padding: 0 5px;
            line-height: 1.2;
        }

        /* ڈراپ ڈاؤن مینو کا مارجن اور سائز فریم کے مطابق کیا */
        .lang-selector {
            margin: 2px auto;
            padding: 3px 10px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 5px;
            border: 2px solid #007bff;
            background: white;
            cursor: pointer;
            display: inline-block;
        }

        .counter-box { font-size: 13px; font-weight: bold; margin: 2px; padding: 2px 10px; background: white; border-radius: 6px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .game-container { position: relative; display: flex; justify-content: space-around; padding: 2px 5px; height: auto; max-width: 600px; margin: auto; }
        .col { display: flex; flex-direction: column; gap: 4px; z-index: 5; }
        
        /* چھوٹے فریم میں فٹ آنے کے لیے بٹنوں کی ہائٹ 32px کی */
        .item { width: 125px; height: 32px; border: 2px solid #007bff; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; }
        .matched { background-color: #c8e6c9 !important; border-color: #2e7d32; opacity: 0.7; pointer-events: none; }
        
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10; }
        
        #feedback { font-size: 50px; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; pointer-events: none; }
        
        #win-message { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; color: white; flex-direction: column; align-items: center; justify-content: center; }
        .win-btn { padding: 10px 20px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #28a745; color: white; margin-top: 15px; }

        /* اگر گیم بڑی اسکرین یا نئے پیج پر کھلے تو خود بخود سائز بڑا ہو جائے گا */
        @media (min-height: 600px) {
            .game-instruction { font-size: 18px; margin: 10px auto 5px auto; }
            .lang-selector { font-size: 15px; padding: 6px 15px; margin: 5px auto; }
            .counter-box { font-size: 16px; padding: 6px 12px; margin: 5px; }
            .col { gap: 8px; }
            .item { width: 140px; height: 38px; font-size: 15px; }
        }
    </style>
</head>
<body>

    <p class="game-instruction">Match the items in the first column with the correct options in the second column.</p>

    <select class="lang-selector" id="langSelect" onchange="changeLanguage()">
        <option value="ur">اردو گنتی (Urdu)</option>
        <option value="hi">ہندی گنتی (Hindi)</option>
        <option value="es">اسپینش گنتی (Spanish)</option>
<option value="ru">روسی گنتی (Russian)</option>
        <option value="bn">بنگالی گنتی (Bangali)</option>
        <option value="fa">فارسی گنتی (persian)</option
<option value="zh-CN">چاینہ گنتی (Chinese)</option>
        <option value="ar">عربی گنتی (Arabic)</option>
        <option value="fr">فرانسیسی گنتی (French)</option>
    </select>

    <div class="counter-box">
        درست: <span id="correct">0</span> | غلط: <span id="wrong">0</span>
    </div>
    
    <div id="feedback"></div>

    <div id="win-message">
        <h1>🎉 بہت خوب! 🎉</h1>
        <button class="win-btn" onclick="location.reload()">دوبارہ کھیلیں</button>
    </div>

    <div class="game-container" id="container">
        <canvas id="lineCanvas"></canvas>
        <div class="col" id="left-col"></div>
        <div class="col" id="right-col"></div>
    </div>

    <script>
        const data = [
            {id: 1, en: "One", ur: "ایک", hi: "एक", es: "Uno"}, 
            {id: 2, en: "Two", ur: "دو", hi: "दो", es: "Dos"}, 
            {id: 3, en: "Three", ur: "تین", hi: "तीन", es: "Tres"}, 
            {id: 4, en: "Four", ur: "چار", hi: "चार", es: "Cuatro"}, 
            {id: 5, en: "Five", ur: "پانچ", hi: "पाँच", es: "Cinco"}, 
            {id: 6, en: "Six", ur: "چھ", hi: "छह", es: "Seis"}, 
            {id: 7, en: "Seven", ur: "سات", hi: "सात", es: "Siete"}, 
            {id: 8, en: "Eight", ur: "آٹھ", hi: "आठ", es: "Ocho"}, 
            {id: 9, en: "Nine", ur: "نو", hi: "नौ", es: "Nueve"}, 
            {id: 10, en: "Ten", ur: "دس", hi: "दस", es: "Diez"}
        ];

        let currentLang = 'ur';
        let correct = 0, wrong = 0;
        let isDrawing = false;
        let startItem = null;
        let currentPos = {x: 0, y: 0};
        
        const canvas = document.getElementById('lineCanvas');
        const ctx = canvas.getContext('2d');
        const lines = [];

        function initGame() {
            const leftCol = document.getElementById('left-col');
            const rightCol = document.getElementById('right-col');
            leftCol.innerHTML = '';
            rightCol.innerHTML = '';
            lines.length = 0;

            const shuffledLeft = [...data].sort(() => Math.random() - 0.5);
            const shuffledRight = [...data].sort(() => Math.random() - 0.5);

            shuffledLeft.forEach(item => {
                let div = document.createElement('div');
                div.className = 'item'; div.innerText = item.id; div.dataset.id = item.id;
                leftCol.appendChild(div);
            });

            shuffledRight.forEach(item => {
                let div = document.createElement('div');
                div.className = 'item'; 
                div.innerText = item[currentLang] + " - " + item.en; 
                div.dataset.id = item.id;
                rightCol.appendChild(div);
            });
        }

        function changeLanguage() {
            currentLang = document.getElementById('langSelect').value;
            correct = 0; wrong = 0;
            document.getElementById('correct').innerText = 0;
            document.getElementById('wrong').innerText = 0;
            initGame();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            lines.forEach(l => drawLine(l.start, l.end, 'green'));
            if (isDrawing && startItem) {
                const rect = startItem.getBoundingClientRect();
                const containerRect = document.getElementById('container').getBoundingClientRect();
                ctx.strokeStyle = '#007bff'; ctx.lineWidth = 4; ctx.beginPath();
                
                if(startItem.parentNode.id === 'left-col') {
                    ctx.moveTo(rect.right - containerRect.left, rect.top + rect.height/2 - containerRect.top);
                } else {
                    ctx.moveTo(rect.left - containerRect.left, rect.top + rect.height/2 - containerRect.top);
                }
                ctx.lineTo(currentPos.x - containerRect.left, currentPos.y - containerRect.top);
                ctx.stroke();
            }
            requestAnimationFrame(render);
        }

        function drawLine(el1, el2, color) {
            const rect1 = el1.getBoundingClientRect();
            const rect2 = el2.getBoundingClientRect();
            const containerRect = document.getElementById('container').getBoundingClientRect();
            ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.beginPath();
            ctx.moveTo(rect1.right - containerRect.left, rect1.top + rect1.height/2 - containerRect.top);
            ctx.lineTo(rect2.left - containerRect.left, rect2.top + rect2.height/2 - containerRect.top);
            ctx.stroke();
        }

        function start(e) { 
            const target = e.target || e.touches[0].target;
            if(target.classList.contains('item') && !target.classList.contains('matched')) { 
                isDrawing = true; 
                startItem = target; 
                const touch = e.touches ? e.touches[0] : e;
                currentPos = {x: touch.clientX, y: touch.clientY};
            } 
        }
        
        function move(e) { if (!isDrawing) return; const touch = e.touches ? e.touches[0] : e; currentPos = {x: touch.clientX, y: touch.clientY}; }

        function end(e) {
            if (!isDrawing) return;
            const touch = e.changedTouches ? e.changedTouches[0] : e;
            const endItem = document.elementFromPoint(touch.clientX, touch.clientY);
            if (endItem && endItem.classList.contains('item') && endItem !== startItem && !endItem.classList.contains('matched') && startItem.dataset.id === endItem.dataset.id) {
                lines.push({start: startItem, end: endItem});
                startItem.classList.add('matched');
                endItem.classList.add('matched');
                correct++;
                document.getElementById('correct').innerText = correct;
                showFeedback("✅");
                if (correct === 10) setTimeout(() => { document.getElementById('win-message').style.display = 'flex'; }, 1000);
            } else if (endItem && endItem.classList.contains('item') && endItem !== startItem) { 
                wrong++; 
                document.getElementById('wrong').innerText = wrong; 
                showFeedback("❌"); 
            }
            isDrawing = false; startItem = null;
        }

        document.body.addEventListener('mousedown', start);
        document.body.addEventListener('touchstart', start);
        document.body.addEventListener('mousemove', move);
        document.body.addEventListener('touchmove', move);
        document.body.addEventListener('mouseup', end);
        document.body.addEventListener('touchend', end);

        function showFeedback(icon) {
            const f = document.getElementById('feedback');
            f.innerText = icon; f.style.display = 'block';
            setTimeout(() => f.style.display = 'none', 800);
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        resizeCanvas();
        initGame();
        render();
    </script>
</body>
</html>
